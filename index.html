<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금융 대시보드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b1120; color: #f8fafc; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* 사이드바 스타일 */
        .sidebar { width: 260px; background-color: #0f172a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: #38bdf8; cursor: pointer; letter-spacing: 2px; }
        .menu-item { color: #94a3b8; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background-color: #1e293b; color: #ffffff; }
        
        /* 공통 메인 내용 스타일 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="Home.js"></script>
    <script type="text/babel" src="Calculator.js"></script>

    <script type="text/babel">
        const { useState } = React;

        // 사이드바 컴포넌트
        function Sidebar({ currentPage, setPage }) {
            return (
                <aside className="sidebar">
                    <div className="logo" onClick={() => setPage('home')}>💎 금융</div>
                    <div className={`menu-item ${currentPage === 'home' ? 'active' : ''}`} onClick={() => setPage('home')}>홈 대시보드</div>
                    <div className={`menu-item ${currentPage === 'calc' ? 'active' : ''}`} onClick={() => setPage('calc')}>A. 현금비중 시뮬레이터</div>
                    <div className="menu-item" onClick={() => alert('B페이지 준비 중입니다.')}>B. 자산 관리</div>
                </aside>
            );
        }

        // 전체 앱 구조 제어
        function App() {
            const [currentPage, setCurrentPage] = useState('home');

            return (
                <div className="app-container">
                    <Sidebar currentPage={currentPage} setPage={setCurrentPage} />
                    <main className="main-content">
                        {/* 외부 파일에서 로드된 컴포넌트들을 연결합니다 */}
                        {currentPage === 'home' && <Home setPage={setCurrentPage} />}
                        {currentPage === 'calc' && <Calculator />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
