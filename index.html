<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMSTONE 대시보드</title>
    <style>
        /* 기본 리셋 및 다크 테마 설정 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0b1120; /* 짙은 남색 배경 */
            color: #f8fafc; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 260px;
            background-color: #0f172a;
            border-right: 1px solid #1e293b;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .menu-item {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .menu-item:hover, .menu-item.active {
            background-color: #1e293b;
            color: #ffffff;
        }

        /* 오른쪽 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
        }
        .greeting {
            font-size: 28px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 계층 구조로 들어가는 A, B, C 링크 카드 */
        .card-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .nav-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: #f8fafc;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .nav-card:hover {
            transform: translateY(-5px); /* 마우스 올리면 살짝 위로 떠오름 */
            background-color: #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .nav-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #38bdf8; /* 포인트 컬러 */
        }
        .nav-card p {
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"> 잡다한거 </div>
        <a href="index.html" class="menu-item active">홈 (메인)</a>
        <a href="page-a.html" class="menu-item">A. 계산기 </a>
        <a href="page-b.html" class="menu-item">B. 관리 </a>
        <a href="page-c.html" class="menu-item">C. 메모 등</a>
    </aside>

    <main class="main-content">
        <h1 class="greeting">ung님, 궁금한 게 있으신가요?</h1>
        
        <div class="card-container">
            <a href="page-a.html" class="nav-card">
                <h3>A. 시장 정보</h3>
                <p>주가지수, 환율, 금리 확인하기</p>
            </a>
            
            <a href="page-b.html" class="nav-card">
                <h3>B. 자산 관리</h3>
                <p>포트폴리오 및 수익률 확인하기</p>
            </a>
            
            <a href="page-c.html" class="nav-card">
                <h3>C. 연구/리포트</h3>
                <p>알파 스캔, 리서치 트래커
